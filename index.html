<!DOCTYPE html>
<html>
<head>
  <title>Password Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Random Password Generator</h1>
<h3><by Panitia Pemilu KMPN</h3>
<div class="box">
  <p id="output">Click the button</p>
  <button onclick="generatePassword()">Generate</button>
</div>

<script>
const passwords = [
"h3t8q","n4x7b","p2m9z","r6k1v", "w8c3t","y5n2x"
  // add the rest here
];

function generatePassword() {
  const randomIndex = Math.floor(Math.random() * passwords.length);
  document.getElementById("output").innerText = passwords[randomIndex];
  document.getElementById("btn").disabled = true;
}
function generatePassword() {
  if (passwords.length === 0) {
    document.getElementById("output").innerText = "No passwords left!";
    return;
  }

  const randomIndex = Math.floor(Math.random() * passwords.length);
  const selected = passwords.splice(randomIndex, 1)[0]; // remove it
  document.getElementById("output").innerText = selected;
}
</script>

</body>
</html>
